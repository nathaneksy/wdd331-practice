<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Animation Demo</title>

    <link rel="stylesheet" href="svg-animation.css">
</head>
<body>

<h1>SVG Animation Demo</h1>

<section>

<h2>Draw-On Checkmark</h2>

<svg width="150"
     height="150"
     viewBox="0 0 100 100">

<path
class="draw-path"
d="M20 55 L45 80 L80 25"
/>

</svg>

<button id="replay">
Replay
</button>

</section>

<section>

<h2>Spinner</h2>

<svg width="120"
     height="120"
     viewBox="0 0 100 100">

<circle
class="spinner"
cx="50"
cy="50"
r="30"
/>

</svg>

</section>

<section>

<h2>Pulse Dot</h2>

<svg width="100"
height="100"
viewBox="0 0 100 100">

<circle
class="pulse"
cx="50"
cy="50"
r="18"
/>

</svg>

</section>

<section>

<h2>Controls</h2>

<label>
<input type="checkbox" id="slow">
Slow Motion
</label>

<label>
<input type="checkbox" id="reduced">
Reduced Motion
</label>

<label>
<input type="checkbox" id="fix" checked>
Transform-Box Fix
</label>

</section>

<script src="svg-animation.js"></script>

</body>
</html>
